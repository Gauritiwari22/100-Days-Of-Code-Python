<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login Form</h2>

    <form method="POST">
        {{ form.hidden_tag() }}

        {{ form.email.label }} <br>
        {{ form.email(size=30) }} <br><br>

        {{ form.password.label }} <br>
        {{ form.password(size=30) }} <br><br>

        {{ form.submit() }}
    </form>
</body>
</html>
