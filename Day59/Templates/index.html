{% extends "base.html" %}

{% block content %}

<h1 class="text-center">All Posts</h1>

{% for post in posts %}
    <div class="card mb-3">
        <div class="card-body">

            <h3>{{ post.title }}</h3>
            <p>{{ post.subtitle }}</p>

            <a href="/post/{{ post.id }}" class="btn btn-primary">
                Read More
            </a>

        </div>
    </div>
{% endfor %}

{% endblock %}
