{% extends "base.html" %}

{% block content %}

<h2 class="mb-4 text-center">Latest Posts</h2>

<div class="row">

{% for post in posts %}
    <div class="col-md-4 mb-4">
        <div class="card p-3">
            <h4>{{ post.title }}</h4>
            <p class="text-muted">
                {{ post.content[:80] }}...
            </p>

            <a href="/post/{{ post.id }}" class="btn btn-primary">
                Read More
            </a>
        </div>
    </div>
{% endfor %}

</div>

{% endblock %}
